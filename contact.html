<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fbff;
      --muted: #b7c3d6;
      --line: rgba(255, 255, 255, 0.18);
      --glass: rgba(13, 20, 33, 0.58);
      --cyan: #67e8f9;
      --rose: #fb7185;
      --gold: #facc15;
      --green: #86efac;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: auto;
      background:
        radial-gradient(circle at 18% 18%, rgba(250, 204, 21, 0.19), transparent 27%),
        radial-gradient(circle at 84% 16%, rgba(251, 113, 133, 0.26), transparent 27%),
        radial-gradient(circle at 48% 88%, rgba(103, 232, 249, 0.18), transparent 30%),
        linear-gradient(135deg, #08111f 0%, #111827 46%, #1a1024 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, black 0 45%, transparent 74%);
      opacity: 0.3;
    }

    .stage {
      width: min(92vw, 980px);
      min-height: min(680px, 88vh);
      position: relative;
      display: grid;
      align-items: center;
      padding: clamp(96px, 9vw, 120px) clamp(28px, 6vw, 72px) clamp(32px, 6vw, 72px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.035)),
        var(--glass);
      box-shadow: 0 34px 90px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(24px);
      isolation: isolate;
    }

    .nav {
      position: absolute;
      top: 22px;
      right: 22px;
      display: flex;
      gap: 8px;
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
    }

    .nav a {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
      text-decoration: none;
      transition: color 180ms ease, background 180ms ease;
    }

    .nav a:hover,
    .nav a.active {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.12);
    }

    .eyebrow {
      width: fit-content;
      margin: 0 0 22px;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      color: var(--gold);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.07);
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(3.4rem, 10vw, 7.2rem);
      line-height: 0.9;
      letter-spacing: 0;
      text-wrap: balance;
    }

    h1 span {
      color: transparent;
      background: linear-gradient(90deg, var(--gold), var(--rose), var(--cyan));
      background-clip: text;
      -webkit-background-clip: text;
    }

    .copy {
      max-width: 650px;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.22rem);
      line-height: 1.7;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 34px;
    }

    .contact-card {
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
    }

    .contact-card span {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .contact-card a {
      color: var(--ink);
      font-size: clamp(1.05rem, 2vw, 1.3rem);
      font-weight: 800;
      text-decoration: none;
      word-break: break-word;
    }

    .contact-card a:hover {
      color: var(--cyan);
    }

    @media (max-width: 720px) {
      .stage {
        padding-top: 96px;
      }

      .nav {
        left: 22px;
        right: 22px;
        justify-content: center;
      }

      .contact-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Contact page">
    <nav class="nav" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a class="active" href="contact.html">Contact</a>
    </nav>

    <section>
      <p class="eyebrow">Contact</p>
      <h1>Say <span>hello</span></h1>
      <p class="copy">
        Ready to make this little site do more? Reach out through the links below, or use this page as a stylish starting point for your real contact details.
      </p>
      <div class="contact-grid" aria-label="Contact links">
        <article class="contact-card">
          <span>Email</span>
          <a href="mailto:hello@example.com">hello@example.com</a>
        </article>
        <article class="contact-card">
          <span>Phone</span>
          <a href="tel:+10000000000">+1 000 000 0000</a>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
