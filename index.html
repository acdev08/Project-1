<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fbff;
      --muted: #b7c3d6;
      --line: rgba(255, 255, 255, 0.18);
      --glass: rgba(13, 20, 33, 0.58);
      --cyan: #67e8f9;
      --rose: #fb7185;
      --gold: #facc15;
      --green: #86efac;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(103, 232, 249, 0.24), transparent 28%),
        radial-gradient(circle at 82% 14%, rgba(251, 113, 133, 0.26), transparent 26%),
        radial-gradient(circle at 50% 88%, rgba(250, 204, 21, 0.18), transparent 30%),
        linear-gradient(135deg, #08111f 0%, #111827 46%, #1a1024 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, black 0 45%, transparent 74%);
      opacity: 0.34;
    }

    .stage {
      width: min(92vw, 980px);
      min-height: min(680px, 88vh);
      position: relative;
      display: grid;
      align-items: center;
      padding: clamp(28px, 6vw, 72px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.035)),
        var(--glass);
      box-shadow: 0 34px 90px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(24px);
      isolation: isolate;
    }

    .nav {
      position: absolute;
      top: 22px;
      right: 22px;
      display: flex;
      gap: 8px;
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
    }

    .nav a {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
      text-decoration: none;
      transition: color 180ms ease, background 180ms ease;
    }

    .nav a:hover,
    .nav a.active {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.12);
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      z-index: -1;
      filter: blur(2px);
    }

    .stage::before {
      width: 220px;
      height: 220px;
      right: -72px;
      top: -72px;
      border: 1px solid rgba(103, 232, 249, 0.5);
      box-shadow: inset 0 0 48px rgba(103, 232, 249, 0.15);
    }

    .stage::after {
      width: 160px;
      height: 160px;
      left: -58px;
      bottom: -58px;
      border: 1px solid rgba(250, 204, 21, 0.42);
      box-shadow: inset 0 0 46px rgba(250, 204, 21, 0.13);
    }

    .eyebrow {
      width: fit-content;
      margin: 0 0 22px;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      color: var(--green);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.07);
    }

    h1 {
      max-width: 820px;
      margin: 0;
      font-size: clamp(4.2rem, 14vw, 10rem);
      line-height: 0.82;
      letter-spacing: 0;
      text-wrap: balance;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, var(--cyan), var(--gold), var(--rose));
      background-clip: text;
      -webkit-background-clip: text;
      text-shadow: 0 0 42px rgba(103, 232, 249, 0.12);
    }

    .copy {
      max-width: 620px;
      margin: 30px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.28rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 36px;
    }

    .button {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 18px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.22);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .button.primary {
      color: #07111f;
      border-color: transparent;
      background: linear-gradient(90deg, var(--cyan), var(--gold));
    }

    .button:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.14);
    }

    .button.primary:hover {
      background: linear-gradient(90deg, var(--gold), var(--rose));
    }

    .spark {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 28px currentColor;
      animation: drift 7s ease-in-out infinite;
    }

    .spark:nth-child(1) {
      top: 18%;
      left: 12%;
      color: var(--cyan);
    }

    .spark:nth-child(2) {
      top: 26%;
      right: 16%;
      color: var(--rose);
      animation-delay: -2s;
    }

    .spark:nth-child(3) {
      right: 30%;
      bottom: 18%;
      color: var(--gold);
      animation-delay: -4s;
    }

    @keyframes drift {
      0%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      50% {
        transform: translate3d(18px, -24px, 0) scale(1.45);
      }
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }

      .stage {
        min-height: 86vh;
        padding-top: 96px;
      }

      .nav {
        left: 22px;
        right: 22px;
        justify-content: center;
      }

      .actions {
        flex-direction: column;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Hello World landing page">
    <nav class="nav" aria-label="Primary navigation">
      <a class="active" href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>

    <i class="spark" aria-hidden="true"></i>
    <i class="spark" aria-hidden="true"></i>
    <i class="spark" aria-hidden="true"></i>

    <section>
      <p class="eyebrow">First page online</p>
      <h1>Hello <span>World</span></h1>
      <p class="copy">
        A tiny greeting dressed for a grand entrance, with glassy depth, bright color, and just enough motion to feel alive.
      </p>
      <div class="actions" aria-label="Page actions">
        <a class="button primary" href="about.html">Start Exploring</a>
        <a class="button" href="contact.html">Say Hello</a>
      </div>
    </section>
  </main>
</body>
</html>
